<section class="project-detail section">
  <div class="container" *ngIf="project; else notFound">
    <a routerLink="/" class="project-detail__back">← Back to home</a>

    <p class="project-detail__eyebrow">Project</p>
    <h1 class="project-detail__title">{{ project.title }}</h1>
    <p class="project-detail__description">{{ project.longDescription }}</p>
  </div>

  <ng-template #notFound>
    <div class="container">
      <p>Project not found.</p>
      <a routerLink="/">Back to home</a>
    </div>
  </ng-template>
</section>
